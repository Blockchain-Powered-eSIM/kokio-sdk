name: Publish SDK

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish-npm:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - run: npm install

      - run: npm publish --access public
